# Book settings
title: NumericalSteepestDescent.jl
author: Thomas Caussade
logo: logo.png

# -----------------------------------------------------------------------------
# Markdown & Rendering Configurations
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM                         # Use GitHub Flavored Markdown
  hard_wrap: false                   # Matches GitHub's line break behavior
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false            # Set to true if you want code line numbers


# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib
  
sphinx:
  config:
    bibtex_reference_style: author_year

# Information about where the book exists on the web
repository:
  url: https://github.com/tcaussade/NumericalSteepestDescent.jl/  # Online location of your book
  path_to_book: docs  # Optional path to your book, relative to the repository root
  branch: main  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
html:
  use_issues_button: true
  use_repository_button: true
  sidebar:
    collapse_navigation: true
    navigation_depth: 4
